<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--accent:#e8ff57;--teal:#57ffd8;--pink:#ff57c8;--text:#f0f0f5;--muted:rgba(240,240,245,0.45);--error:#ff6b6b;--success:#57ffd8;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#030407;color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    #bgCanvas{position:fixed;inset:0;z-index:0;}



    .grid{position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:linear-gradient(rgba(232,255,87,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,87,0.02) 1px,transparent 1px);
      background-size:60px 60px;}

    /* ── CARD ── */
    .card{
      position:relative;z-index:10;width:100%;max-width:410px;
      padding:44px 38px;
      background:rgba(5,6,12,0.9);
      border:1px solid rgba(232,255,87,0.18);
      border-radius:28px;backdrop-filter:blur(40px);
      box-shadow:0 0 100px rgba(232,255,87,0.05),0 50px 100px rgba(0,0,0,0.8);
      animation:cardIn 1s cubic-bezier(0.16,1,0.3,1) both;
      transition:transform 0.1s;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(50px) scale(0.93)}to{opacity:1;transform:translateY(0) scale(1)}}

    .logo{display:flex;align-items:center;gap:13px;margin-bottom:30px;}
    .logo-mark{width:44px;height:44px;background:var(--accent);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;animation:logoPulse 3s ease-in-out infinite;box-shadow:0 0 30px rgba(232,255,87,0.4);}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 20px rgba(232,255,87,0.3)}50%{box-shadow:0 0 60px rgba(232,255,87,0.8)}}
    .logo-name{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--accent);}

    .heading{margin-bottom:24px;}
    .heading h2{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);letter-spacing:-0.03em;line-height:1.1;min-height:2.1rem;}
    .heading p{color:var(--muted);font-size:0.86rem;margin-top:5px;}

    .form-group{margin-bottom:13px;}
    label{display:block;font-size:0.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:0.3;pointer-events:none;transition:opacity 0.2s;}
    input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 14px 13px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.92rem;outline:none;transition:all 0.25s;}
    input:focus{border-color:var(--accent);background:rgba(232,255,87,0.03);box-shadow:0 0 0 3px rgba(232,255,87,0.08);}
    .input-wrap:focus-within .icon{opacity:1;}
    input::placeholder{color:rgba(240,240,245,0.18);}

    .btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:14px;color:#030407;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transform:translateX(-100%);transition:transform 0.5s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(232,255,87,0.45);}
    .btn:hover::before{transform:translateX(100%);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    /* Social buttons row */
    .social-row{display:flex;gap:10px;margin-top:0;}
    .social-btn{flex:1;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 18px;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;color:var(--text);transition:all 0.3s;position:relative;overflow:hidden;}
    .social-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(66,133,244,0.0),rgba(66,133,244,0.08));opacity:0;transition:opacity 0.3s;}
    .google-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(66,133,244,0.4);transform:translateY(-2px);box-shadow:0 8px 30px rgba(66,133,244,0.2);}
    .google-btn:hover::after{opacity:1;}
    .social-btn svg{width:20px;height:20px;flex-shrink:0;}

    /* Extra login page animations */
    @keyframes floatRing{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.15}50%{transform:translate(-50%,-50%) scale(1.08);opacity:0.25}}
    @keyframes scanLine{0%{top:-2px;opacity:0}10%{opacity:0.4}90%{opacity:0.4}100%{top:100%;opacity:0}}
    .logo-name{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--accent);}

    .msg{padding:10px 13px;border-radius:10px;font-size:0.82rem;margin-bottom:12px;display:none;}
    .msg.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--error);}
    .msg.success{background:rgba(87,255,216,0.1);border:1px solid rgba(87,255,216,0.3);color:var(--success);}

    .divider{text-align:center;color:var(--muted);font-size:0.75rem;margin:13px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:41%;height:1px;background:rgba(255,255,255,0.06);}
    .divider::before{left:0;}.divider::after{right:0;}

    .link-btn{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.86rem;cursor:pointer;transition:all 0.25s;margin-top:10px;display:block;text-align:center;}
    .link-btn:hover{border-color:var(--accent);color:var(--accent);}

    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(3,4,7,0.3);border-top-color:#030407;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:7px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .cursor-txt{display:inline-block;width:2px;height:1.6rem;background:var(--accent);margin-left:3px;vertical-align:middle;animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* Mouse trail hint */
    .hint-badge{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(5,6,12,0.7);border:1px solid rgba(232,255,87,0.12);border-radius:20px;padding:6px 16px;font-size:0.68rem;color:var(--muted);backdrop-filter:blur(10px);white-space:nowrap;animation:fadeSlide 1s 2s both;}
    @keyframes fadeSlide{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* ── Extra background animations ── */
    @keyframes rotateHex{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes pulseRing{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.06}50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.12}}
    @keyframes driftParticle{0%{transform:translateY(0) translateX(0);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(-100vh) translateX(40px);opacity:0}}
    @keyframes scanH{0%{top:-2px;opacity:0}5%{opacity:0.5}95%{opacity:0.5}100%{top:100%;opacity:0}}
    .bg-hex{position:fixed;width:500px;height:500px;border:1px solid rgba(87,255,216,0.05);border-radius:8px;top:50%;left:50%;animation:rotateHex 40s linear infinite;pointer-events:none;z-index:2;}
    .bg-hex2{position:fixed;width:800px;height:800px;border:1px solid rgba(87,255,216,0.03);border-radius:8px;top:50%;left:50%;animation:rotateHex 70s linear infinite reverse;pointer-events:none;z-index:2;}
    .bg-ring{position:fixed;border-radius:50%;top:50%;left:50%;pointer-events:none;z-index:2;}
    .scan-line{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(87,255,216,0.2),transparent);animation:scanH 8s linear infinite;pointer-events:none;z-index:3;}
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="grid"></div>
<div class="bg-hex"></div>
<div class="bg-hex2"></div>
<div class="bg-ring" style="width:300px;height:300px;border:1px solid rgba(232,255,87,0.04);animation:pulseRing 6s ease-in-out infinite;"></div>
<div class="bg-ring" style="width:700px;height:700px;border:1px solid rgba(87,255,216,0.03);animation:pulseRing 9s ease-in-out infinite reverse;"></div>
<div class="bg-ring" style="width:1100px;height:1100px;border:1px solid rgba(255,87,200,0.02);animation:pulseRing 14s ease-in-out infinite;"></div>
<div class="scan-line"></div>

<!-- Floating decorative rings behind card -->
<div style="position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden">
  <div style="position:absolute;width:600px;height:600px;border:1px solid rgba(87,255,216,0.06);border-radius:50%;top:50%;left:50%;animation:floatRing 8s ease-in-out infinite;"></div>
  <div style="position:absolute;width:900px;height:900px;border:1px solid rgba(232,255,87,0.04);border-radius:50%;top:50%;left:50%;animation:floatRing 12s ease-in-out infinite reverse;"></div>
  <div style="position:absolute;width:1200px;height:1200px;border:1px solid rgba(255,87,200,0.03);border-radius:50%;top:50%;left:50%;animation:floatRing 16s ease-in-out infinite;"></div>
</div>

<div class="card" id="loginCard">
  <!-- Scan line effect -->
  <div style="position:absolute;inset:0;border-radius:28px;overflow:hidden;pointer-events:none;z-index:1">
    <div style="position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(87,255,216,0.3),transparent);animation:scanLine 4s linear infinite;"></div>
  </div>
  <div class="logo">
    <div class="logo-mark">✦</div>
    <span class="logo-name">TaskFlow</span>
  </div>
  <div class="heading">
    <h2 id="typedHeading"></h2>
    <p>Sign in to manage your tasks</p>
  </div>

  <div class="msg error" id="errMsg"></div>
  <div class="msg success" id="okMsg"></div>

  <div class="form-group">
    <label>Email</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      <span class="icon">📧</span>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Your password"/>
      <span class="icon">🔑</span>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>

  <div class="divider">or continue with</div>

  <div class="social-row">
    <button class="social-btn google-btn" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="divider" style="margin-top:13px;">no account?</div>
  <a class="link-btn" href="register.html">Create a new account</a>
</div>

<div class="hint-badge">✦ Ambient UI — always alive</div>

<script>
const API="/api";
if(localStorage.getItem("token"))location.href="index.html";
// Show error if redirected back from Google with error
(()=>{
  const p=new URLSearchParams(window.location.search);
  if(p.get('error')){
    const e=document.getElementById('errMsg');
    e.textContent='⚠ Google sign-in failed. Please try again or use email login.';
    e.style.display='block';
  }
})();

let mx=window.innerWidth/2,my=window.innerHeight/2;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;});

const card=document.getElementById('loginCard');

// ── Canvas background ──
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
let W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;
window.addEventListener("resize",()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});

// Mouse trail particles
const trail=[];
document.addEventListener("mousemove",e=>{
  for(let i=0;i<3;i++){
    trail.push({x:e.clientX,y:e.clientY,r:Math.random()*3+1,life:1,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2-1,color:Math.random()>0.5?"#e8ff57":"#57ffd8"});
  }
  if(trail.length>200)trail.splice(0,trail.length-200);
});

// Connection lines between nearby particles
const nodes=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*0.4,vy:(Math.random()-.5)*0.4,r:Math.random()*1.5+0.5,color:Math.random()>0.5?"#e8ff57":"#57ffd8",o:Math.random()*0.3+0.05}));

// Persistent ambient neon green glowing orb — drifts slowly, parallax on mouse
let orbX=W*0.72, orbY=H*0.28;
let orbVx=0.18, orbVy=0.12;
let orbTargetX=orbX, orbTargetY=orbY;
document.addEventListener('mousemove',e=>{
  // Subtle parallax: orb drifts slightly toward mouse (very slow)
  orbTargetX = W*0.72 + (e.clientX - W/2)*0.04;
  orbTargetY = H*0.28  + (e.clientY - H/2)*0.04;
});

// Floating task cards
const TASKS=["Design UI","Ship feature","Daily workout","Read 30 mins","Code review","Deploy v2","Study math","Team sync","Write docs","Fix bug #42"];
const fcards=Array.from({length:6},(_,i)=>({x:Math.random()*W,y:Math.random()*H,w:160+Math.random()*50,h:44,label:TASKS[i],done:Math.random()>0.5,vx:(Math.random()-.5)*0.3,vy:(Math.random()-.5)*0.2,alpha:0.06+Math.random()*0.08,color:Math.random()>0.5?"rgba(232,255,87,":"rgba(87,255,216,"}));

// Background orbs
const orbs=[{x:W*.1,y:H*.2,r:320,vx:.2,vy:.1,color:"rgba(232,255,87,0.04)"},{x:W*.85,y:H*.75,r:280,vx:-.15,vy:-.18,color:"rgba(87,255,216,0.04)"},{x:W*.5,y:H*.5,r:220,vx:.15,vy:-.15,color:"rgba(255,87,200,0.03)"}];

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

// Ambient floating orb (persistent background element)
let ambX=W*0.5,ambY=H*0.4,ambVx=0.45,ambVy=0.3;
let ambAngle=0;
// Parallax offset from mouse
let parallaxX=0,parallaxY=0;
document.addEventListener('mousemove',e=>{
  parallaxX=(e.clientX/W-0.5)*30;
  parallaxY=(e.clientY/H-0.5)*20;
});
// Mouse parallax effect on card
document.addEventListener('mousemove',e=>{
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy;
  card.style.transform=`perspective(800px) rotateY(${dx*4}deg) rotateX(${-dy*3}deg)`;
});

function draw(){
  ctx.clearRect(0,0,W,H);

  // Ambient floating neon orb
  ambAngle+=0.008;
  ambX+=ambVx;ambY+=ambVy;
  if(ambX<100||ambX>W-100)ambVx*=-1;
  if(ambY<100||ambY>H-100)ambVy*=-1;
  const oax=ambX+parallaxX,oay=ambY+parallaxY;
  // Pulsing glow
  const pulse=0.06+Math.sin(ambAngle)*0.025;
  const ag=ctx.createRadialGradient(oax,oay,0,oax,oay,200);
  ag.addColorStop(0,`rgba(87,255,216,${pulse})`);
  ag.addColorStop(0.4,`rgba(87,255,216,${pulse*0.3})`);
  ag.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(oax,oay,200,0,Math.PI*2);ctx.fillStyle=ag;ctx.fill();
  // Inner bright core
  const ag2=ctx.createRadialGradient(oax,oay,0,oax,oay,60);
  ag2.addColorStop(0,`rgba(87,255,216,${pulse*1.5})`);
  ag2.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(oax,oay,60,0,Math.PI*2);ctx.fillStyle=ag2;ctx.fill();
  // Particle trail lines from ambient orb
  if(Math.random()<0.3){
    const px=oax+(Math.random()-0.5)*160;
    const py=oay+(Math.random()-0.5)*160;
    ctx.beginPath();ctx.moveTo(oax,oay);ctx.lineTo(px,py);
    ctx.strokeStyle=`rgba(87,255,216,${Math.random()*0.06})`;
    ctx.lineWidth=0.5;ctx.stroke();
  }

  // Orbs
  orbs.forEach(o=>{o.x+=o.vx;o.y+=o.vy;if(o.x<-o.r||o.x>W+o.r)o.vx*=-1;if(o.y<-o.r||o.y>H+o.r)o.vy*=-1;const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);g.addColorStop(0,o.color);g.addColorStop(1,"transparent");ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});

  // Connection lines
  nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});
  // Lines to ambient orb (persistent, not mouse-driven)
  nodes.forEach(n=>{const dx=ambX-n.x,dy=ambY-n.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<200){ctx.beginPath();ctx.strokeStyle=n.color;ctx.globalAlpha=(1-dist/200)*0.18;ctx.lineWidth=0.7;ctx.moveTo(n.x,n.y);ctx.lineTo(ambX,ambY);ctx.stroke();}});
  // Lines between nodes
  for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.strokeStyle="rgba(255,255,255,1)";ctx.globalAlpha=(1-dist/100)*0.04;ctx.lineWidth=0.5;ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}}}

  // Node dots
  nodes.forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=n.color;ctx.globalAlpha=n.o;ctx.fill();});

  // Floating task cards
  fcards.forEach(c=>{
    c.x+=c.vx;c.y+=c.vy;
    if(c.x<-c.w-20)c.x=W+20;if(c.x>W+20)c.x=-c.w-20;
    if(c.y<-c.h-20)c.y=H+20;if(c.y>H+20)c.y=-c.h-20;
    // Mouse repel
    const dx=c.x-mx,dy=c.y-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<120){c.x+=dx/dist*1.5;c.y+=dy/dist*1.5;}
    ctx.save();ctx.globalAlpha=c.alpha;
    ctx.fillStyle="rgba(8,10,18,0.95)";ctx.strokeStyle=c.color+"0.4)";ctx.lineWidth=1;
    rr(ctx,c.x,c.y,c.w,c.h,8);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(c.x+14,c.y+c.h/2,5.5,0,Math.PI*2);
    if(c.done){ctx.fillStyle=c.color+"0.9)";ctx.fill();}else{ctx.strokeStyle=c.color+"0.5)";ctx.lineWidth=1.5;ctx.stroke();}
    ctx.fillStyle="rgba(238,240,247,0.85)";ctx.font="11px 'DM Sans',sans-serif";ctx.fillText(c.label,c.x+26,c.y+c.h/2+4);
    ctx.restore();
  });

  // Mouse trail (kept subtle)
  for(let i=trail.length-1;i>=0;i--){
    const t=trail[i];t.life-=0.06;t.x+=t.vx;t.y+=t.vy;t.r*=0.93;
    if(t.life<=0){trail.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fillStyle=t.color;ctx.globalAlpha=t.life*0.25;ctx.fill();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(draw);
}
draw();

// ── Typing animation ──
const words=["Welcome back!","Let's get stuff done.","Ready to focus?","Mission starts now."];
let wi=0,ci=0,del=false;
const el=document.getElementById("typedHeading");
function type(){const w=words[wi];if(!del){el.innerHTML=w.slice(0,++ci)+'<span class="cursor-txt"></span>';if(ci===w.length){del=true;setTimeout(type,2200);return;}}else{el.innerHTML=w.slice(0,--ci)+'<span class="cursor-txt"></span>';if(ci===0){del=false;wi=(wi+1)%words.length;}}setTimeout(type,del?50:90);}
setTimeout(type,600);

// ── Auth ──
function googleSignIn(){
  // Redirect to backend Google OAuth
  window.location.href = '/api/auth/google';
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")login();});
async function login(){
  const email=document.getElementById("email").value.trim(),password=document.getElementById("password").value.trim(),btn=document.getElementById("loginBtn");
  hideMsg();if(!email||!password){showErr("Please fill in all fields");return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Signing in...';
  try{
    const res=await fetch(`${API}/auth/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(data.success){localStorage.setItem("token",data.data.token);localStorage.setItem("userName",data.data.name);localStorage.setItem("userEmail",data.data.email);showOk("Welcome back, "+data.data.name+"! 🎉");setTimeout(()=>location.href="index.html",900);}
    else showErr(data.message||"Login failed");
  }catch{showErr("Cannot connect to server. Is backend running?");}
  finally{btn.disabled=false;btn.innerHTML="Sign In →";}
}
function showErr(m){const e=document.getElementById("errMsg");e.textContent="⚠ "+m;e.style.display="block";}
function showOk(m){const e=document.getElementById("okMsg");e.textContent="✅ "+m;e.style.display="block";}
function hideMsg(){document.getElementById("errMsg").style.display="none";document.getElementById("okMsg").style.display="none";}
</script>
</body>
</html>
