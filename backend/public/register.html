<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #050508;
      --accent: #e8ff57;
      --accent2: #57ffd8;
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --error: #ff6b6b;
      --success: #57ffd8;
      --s1: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    /* Animated background */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.12;
      animation: orbFloat linear infinite;
    }
    .orb1 { width: 600px; height: 600px; background: #57ffd8; top: -200px; right: -200px; animation-duration: 20s; }
    .orb2 { width: 400px; height: 400px; background: #e8ff57; bottom: -150px; left: -100px; animation-duration: 25s; animation-delay: -8s; }
    .orb3 { width: 300px; height: 300px; background: #ff57c8; top: 40%; left: 20%; animation-duration: 18s; animation-delay: -12s; }

    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-40px) scale(1.05); }
      66%      { transform: translate(-25px,25px) scale(0.95); }
    }

    canvas#stars { position: fixed; inset: 0; z-index: 0; }

    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(87,255,216,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(87,255,216,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Card */
    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 44px 42px;
      background: rgba(8,8,14,0.9);
      border: 1px solid rgba(87,255,216,0.12);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 100px rgba(87,255,216,0.05), 0 50px 100px rgba(0,0,0,0.6);
      animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(50px) scale(0.93); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s both;
    }

    .logo-mark {
      width: 46px; height: 46px;
      background: var(--accent2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #050508;
      box-shadow: 0 0 35px rgba(87,255,216,0.5);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 25px rgba(87,255,216,0.4); }
      50%      { box-shadow: 0 0 55px rgba(87,255,216,0.75); }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--accent2);
      letter-spacing: -0.02em;
    }

    /* Heading — FIXED, no compression */
    .heading {
      margin-bottom: 30px;
      animation: fadeUp 0.6s 0.3s both;
    }

    .heading h2 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: normal;
      word-break: normal;
    }

    .heading h2 span {
      color: var(--accent2);
    }

    .heading p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Form */
    .form-group { margin-bottom: 16px; animation: fadeUp 0.6s both; }
    .form-group:nth-child(1) { animation-delay: 0.35s; }
    .form-group:nth-child(2) { animation-delay: 0.4s; }
    .form-group:nth-child(3) { animation-delay: 0.45s; }
    .form-group:nth-child(4) { animation-delay: 0.5s; }

    label {
      display: block; font-size: 0.74rem; font-weight: 500;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px;
    }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; opacity: 0.3; pointer-events: none; transition: opacity 0.2s; }
    .input-wrap:focus-within .input-icon { opacity: 1; }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px 16px 14px 44px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s;
    }

    input:focus {
      border-color: var(--accent2);
      background: rgba(87,255,216,0.04);
      box-shadow: 0 0 0 3px rgba(87,255,216,0.12);
    }

    input::placeholder { color: rgba(240,240,245,0.2); }

    /* Strength */
    .strength-wrap { margin-top: 8px; }
    .strength-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.35s, background 0.35s; }
    .strength-text { font-size: 0.72rem; margin-top: 5px; color: var(--muted); }

    /* Hint */
    .hint { font-size: 0.73rem; color: var(--muted); margin-top: 5px; padding-left: 2px; }

    /* Messages */
    .msg { padding: 11px 14px; border-radius: 10px; font-size: 0.84rem; margin-bottom: 14px; display: none; animation: msgIn 0.3s ease; }
    .msg.error   { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--error); }
    .msg.success { background: rgba(87,255,216,0.1);  border: 1px solid rgba(87,255,216,0.3);  color: var(--success); }
    @keyframes msgIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* Button */
    .btn {
      width: 100%; background: var(--accent2); border: none;
      border-radius: 12px; padding: 15px;
      color: #050508; font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      margin-top: 6px; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.6s 0.55s both;
    }

    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: translateX(-100%); transition: transform 0.55s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(87,255,216,0.45); }
    .btn:hover::before { transform: translateX(100%); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      text-align: center; color: var(--muted); font-size: 0.78rem;
      margin: 20px 0; position: relative;
      animation: fadeUp 0.6s 0.6s both;
    }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: rgba(255,255,255,0.06); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .link-btn {
      width: 100%; background: transparent;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
      padding: 13px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      cursor: pointer; transition: all 0.25s;
      animation: fadeUp 0.6s 0.65s both;
    }
    .link-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(87,255,216,0.04); }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(5,5,8,0.3); border-top-color: #050508; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas id="stars"></canvas>
<div class="grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">✦</div>
    <span class="logo-text">TaskFlow</span>
  </div>

  <div class="heading">
    <h2>Create your <span>account</span> ✨</h2>
    <p>Join thousands of focused people and start crushing your goals today.</p>
  </div>

  <div class="msg error"   id="errMsg"></div>
  <div class="msg success" id="okMsg"></div>

  <div class="form-group">
    <label>Full Name</label>
    <div class="input-wrap">
      <input type="text" id="name" placeholder="Your full name" autocomplete="name"/>
      <span class="input-icon">👤</span>
    </div>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      <span class="input-icon">📧</span>
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)"/>
      <span class="input-icon">🔑</span>
    </div>
    <div class="strength-wrap">
      <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
      <div class="strength-text" id="sText"></div>
    </div>
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat your password"/>
      <span class="input-icon">🔒</span>
    </div>
  </div>

  <button class="btn" id="regBtn" onclick="register()">Create Account →</button>

  <div class="divider">already have an account?</div>
  <button class="link-btn" onclick="location.href='login.html'">Sign in instead</button>
</div>

<script>
  const API = "http://localhost:5000/api";
  if (localStorage.getItem("token")) location.href = "index.html";

  // Stars
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener("resize", ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  const stars = Array.from({length:80},()=>({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight, r:Math.random()*1.2+0.3, o:Math.random()*0.4+0.1, dx:(Math.random()-.5)*0.3, dy:(Math.random()-.5)*0.3, color:Math.random()>.5?"#57ffd8":"#e8ff57" }));
  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{ s.x+=s.dx; s.y+=s.dy; if(s.x<0)s.x=canvas.width; if(s.x>canvas.width)s.x=0; if(s.y<0)s.y=canvas.height; if(s.y>canvas.height)s.y=0; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=s.color; ctx.globalAlpha=s.o; ctx.fill(); });
    ctx.globalAlpha=1; requestAnimationFrame(drawStars);
  }
  drawStars();

  document.addEventListener("keydown", e=>{ if(e.key==="Enter") register(); });

  function checkStrength(v) {
    const fill=document.getElementById("sFill"), text=document.getElementById("sText");
    if(!v){fill.style.width="0%";text.textContent="";return;}
    let s=0;
    if(v.length>=6)s++; if(v.length>=10)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
    const l=[{w:"20%",c:"#ff6b6b",t:"Weak"},{w:"40%",c:"#ffa94d",t:"Fair"},{w:"60%",c:"#e8ff57",t:"Good"},{w:"80%",c:"#57ffd8",t:"Strong"},{w:"100%",c:"#57ff9a",t:"Very Strong 💪"}];
    const d=l[Math.min(s-1,4)]||l[0];
    fill.style.width=d.w; fill.style.background=d.c;
    text.textContent=d.t; text.style.color=d.c;
  }

  async function register() {
    const name=document.getElementById("name").value.trim();
    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value.trim();
    const confirm=document.getElementById("confirm").value.trim();
    const btn=document.getElementById("regBtn");
    hideMsg();
    if(!name||!email||!password||!confirm){showErr("Please fill all fields");return;}
    if(password.length<6){showErr("Password must be at least 6 characters");return;}
    if(password!==confirm){showErr("Passwords do not match");return;}
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Creating account...';
    try {
      const res=await fetch(`${API}/auth/register`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,email,password})});
      const data=await res.json();
      if(data.success){
        localStorage.setItem("token",data.data.token);
        localStorage.setItem("userName",data.data.name);
        localStorage.setItem("userEmail",data.data.email);
        showOk("Account created! Welcome aboard 🚀");
        setTimeout(()=>location.href="index.html",900);
      } else { showErr(data.message||"Registration failed"); }
    } catch { showErr("Cannot connect to server. Is backend running?"); }
    finally { btn.disabled=false; btn.innerHTML="Create Account →"; }
  }

  function showErr(m){const e=document.getElementById("errMsg");e.textContent="⚠ "+m;e.style.display="block";}
  function showOk(m){const e=document.getElementById("okMsg");e.textContent="✅ "+m;e.style.display="block";}
  function hideMsg(){document.getElementById("errMsg").style.display="none";document.getElementById("okMsg").style.display="none";}
</script>
</body>
</html>
