<!DOCTYPE html>
<html>
<head><title>Signing in...</title>
<style>
  body{background:#030407;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:'DM Sans',sans-serif;color:#eef0f7;}
  .box{text-align:center;}
  .spinner{width:40px;height:40px;border:3px solid rgba(87,255,216,0.2);border-top-color:#57ffd8;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{color:rgba(238,240,247,0.5);font-size:0.9rem;}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Signing you in with Google...</p>
</div>
<script>
  const p = new URLSearchParams(window.location.search);
  const token = p.get('token');
  const name = p.get('name');
  const email = p.get('email');
  if (token) {
    localStorage.setItem('token', token);
    localStorage.setItem('userName', name || 'User');
    localStorage.setItem('userEmail', email || '');
    window.location.href = 'index.html';
  } else {
    window.location.href = 'login.html?error=auth_failed';
  }
</script>
</body>
</html>
